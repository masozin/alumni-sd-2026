<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pelepasan Kelas VI — SDN 01 Totorejo 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gold: #d4a943;
        --gold-lt: #f5d780;
        --gold-dk: #8b6914;
        --glow: rgba(212, 169, 67, 0.28);
        --bg: #06091a;
        --bg2: #0e1628;
        --card: rgba(10, 18, 40, 0.92);
        --w: #f5f0e8;
        --wd: rgba(245, 240, 232, 0.55);
        --wm: rgba(245, 240, 232, 0.85);
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--w);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      #cv {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      .aurora {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 70% 50% at 15% 65%,
            rgba(80, 40, 180, 0.12) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 55% 40% at 85% 25%,
            rgba(212, 169, 67, 0.07) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 50% 60% at 50% 100%,
            rgba(30, 80, 220, 0.09) 0%,
            transparent 70%
          );
      }

      .pg {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 22px 36px 16px;
      }

      header {
        text-align: center;
        animation: fadeD 0.9s ease both;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-size: 0.88rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 5px;
      }
      .bl {
        width: 26px;
        height: 1px;
        background: var(--gold);
        opacity: 0.55;
      }
      header h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2rem, 2.8vw, 3.8rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        line-height: 1.2;
        background: linear-gradient(
          90deg,
          var(--gold-lt) 0%,
          var(--w) 20%,
          var(--gold) 40%,
          var(--w) 60%,
          var(--gold-lt) 80%,
          var(--w) 100%
        );
        background-size: 250% auto;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: shimmerText 20s linear infinite;
      }

      @keyframes shimmerText {
        0% {
          background-position: 200% center;
        }
        100% {
          background-position: -200% center;
        }
      }

      .sch {
        font-size: clamp(1.2rem, 1.8vw, 3rem);
        color: var(--wd);
        margin-top: 4px;
        letter-spacing: 0.08em;
      }
      .gl {
        width: 60px;
        height: 1px;
        margin: 8px auto 0;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
        opacity: 0.5;
      }

      .gl2 {
        width: 300px;
        height: 1px;
        margin: 8px auto 0;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
        opacity: 0.5;
      }

      .sz {
        display: flex;
        align-items: center;
        gap: 18px;
        width: 100%;
        max-width: 1160px;
        flex: 1;
        min-height: 0;
        padding: 10px 0;
      }

      .nb {
        width: 48px;
        height: 48px;
        flex-shrink: 0;
        border-radius: 50%;
        border: 1px solid rgba(212, 169, 67, 0.35);
        background: rgba(212, 169, 67, 0.07);
        color: var(--gold);
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.25s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(12px);
        user-select: none;

        /* ── TAMBAHAN BARU: Membuat tombol melayang bebas di desktop ── */
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
      }
      .nb:hover {
        background: var(--gold);
        color: var(--bg);
        border-color: var(--gold);
        transform: scale(1.08);
        box-shadow: 0 0 22px var(--glow);
      }
      .nb:active {
        transform: scale(0.95);
      }

      /* ── TAMBAHAN BARU: Tentukan koordinat tombol Kiri & Kanan di desktop ── */
      #pBtn {
        left: 40px;
      }
      #nBtn {
        right: 40px;
      }

      .vp {
        flex: 1;
        height: 100%;
        position: relative;
        min-width: 0;
        perspective: 1200px;
      }

      .card {
        position: absolute;
        inset: 0;
        display: flex;
        border-radius: 22px;
        overflow: hidden;
        background: var(--card);
        backdrop-filter: blur(28px);
        -webkit-backdrop-filter: blur(28px);
        border: 1px solid rgba(212, 169, 67, 0.2);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03) inset,
          0 40px 80px rgba(0, 0, 0, 0.6);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1),
          transform 2.5s cubic-bezier(0.4, 0, 0.2, 1),
          visibility 2.5s;
        will-change: transform, opacity;
      }
      .card.from-right {
        transform: translateX(90px) scale(0.94);
        opacity: 0;
      }
      .card.from-left {
        transform: translateX(-90px) scale(0.94);
        opacity: 0;
      }
      .card.active {
        opacity: 0.9;
        visibility: visible;
        pointer-events: all;
        transform: translateX(0) scale(1);
        animation: borderPulse 5s ease 1.2s infinite;
      }
      .card.to-left {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translateX(-90px) scale(0.94);
        transition-duration: 2.5s;
      }
      .card.to-right {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translateX(90px) scale(0.94);
        transition-duration: 2.5s;
      }
      @keyframes borderPulse {
        0%,
        100% {
          border-color: rgba(212, 169, 67, 0.2);
        }
        50% {
          border-color: rgba(212, 169, 67, 0.5);
          box-shadow:
            0 0 0 1px rgba(255, 255, 255, 0.03) inset,
            0 40px 80px rgba(0, 0, 0, 0.6),
            0 0 40px rgba(212, 169, 67, 0.1);
        }
      }

      /* ── PHOTO SIDE ── */
      .cp {
        width: 42%;
        flex-shrink: 0;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .cp::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          circle,
          rgba(212, 169, 67, 0.05) 1px,
          transparent 1px
        );
        background-size: 22px 22px;
      }
      .cp::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
        opacity: 0.45;
      }

      .photo-wrap {
        position: relative;
        width: 300px;
        height: 300px;
        z-index: 1;
      }

      .orbit {
        position: absolute;
        inset: -12px;
        border-radius: 50%;
        border: 1px dashed rgba(212, 169, 67, 0.25);
        animation: spinA 20s linear infinite;
      }
      .orbit::before,
      .orbit::after {
        content: "";
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--gold);
        top: 50%;
        transform: translateY(-50%);
      }
      .orbit::before {
        left: -3px;
      }
      .orbit::after {
        right: -3px;
      }
      @keyframes spinA {
        to {
          transform: rotate(360deg);
        }
      }

      .ring-spin {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        padding: 5px;
        background: conic-gradient(
          var(--gold-lt) 0deg,
          transparent 38deg,
          var(--gold) 76deg,
          transparent 114deg,
          var(--gold-lt) 152deg,
          transparent 190deg,
          var(--gold) 228deg,
          transparent 266deg,
          var(--gold-lt) 304deg,
          transparent 342deg,
          var(--gold-lt) 360deg
        );
        animation: spinA 9s linear infinite;
        filter: drop-shadow(0 0 9px rgba(212, 169, 67, 0.5));
      }

      /* ── REFACTOR FADE SCENE (Sangat Ringan & Elegan) ── */
      .flip-scene {
        width: calc(100% - 10px);
        height: calc(100% - 10px);
        position: absolute;
        inset: 5px;
        border-radius: 50%;
        cursor: pointer;
      }

      .flip-front,
      .flip-back {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        overflow: hidden;
        background: #070c1c;
        /* Menggunakan transisi opacity untuk fade yang sangat mulus */
        transition:
          opacity 2s ease,
          transform 2s ease;
      }

      /* Foto Sekarang (Tampil Default) */
      .flip-front {
        opacity: 1;
        transform: scale(1);
        z-index: 2;
      }

      /* Foto Cita-cita (Tersembunyi Default) */
      .flip-back {
        opacity: 0;
        /* Sedikit dibesarkan di awal biar efek masuknya terasa sinematik */
        transform: scale(1.15);
        z-index: 1;
        pointer-events: none;
      }

      .flip-front img,
      .flip-back img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      /* ── SAAT DIKLIK (Class .flipped aktif) ── */
      /* Foto Sekarang menghilang dan mengecil */
      .flip-scene.flipped .flip-front {
        opacity: 0;
        transform: scale(0.9);
        pointer-events: none;
      }

      /* Foto Cita-cita muncul pelan-pelan */
      .flip-scene.flipped .flip-back {
        opacity: 1;
        transform: scale(1);
        z-index: 3;
        pointer-events: all;
      }

      .photo-badge {
        position: absolute;
        bottom: -2px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 5px;
        z-index: 10;
      }
      .pb-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        border: 1.5px solid rgba(212, 169, 67, 0.45);
        cursor: pointer;
        transition: all 0.3s ease;
        background: transparent;
      }
      .pb-dot.pa {
        background: var(--gold);
        border-color: var(--gold);
        box-shadow: 0 0 6px rgba(212, 169, 67, 0.7);
      }

      .sno {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.64rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--gold);
        white-space: nowrap;
        opacity: 0.75;
      }

      .photo-label {
        position: absolute;
        top: -45px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.6rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--gold-lt);
        background: rgba(6, 9, 26, 0.75);
        padding: 3px 10px;
        border-radius: 20px;
        border: 1px solid rgba(212, 169, 67, 0.22);
        white-space: nowrap;
        pointer-events: none;
        transition: opacity 0.4s ease;
        backdrop-filter: blur(6px);
      }

      .pcv {
        position: absolute;
        inset: -30px;
        border-radius: 50%;
        pointer-events: none;
        z-index: 20;
      }

      .cdv {
        width: 1px;
        flex-shrink: 0;
        background: linear-gradient(
          to bottom,
          transparent,
          rgba(212, 169, 67, 0.28),
          transparent
        );
        align-self: stretch;
        margin: 36px 0;
      }

      .ci {
        flex: 1;
        padding: 34px 44px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        min-width: 0;
        overflow: hidden;
      }
      .ci::before {
        content: "";
        position: absolute;
        top: 0;
        right: 0;
        width: 120px;
        height: 120px;
        background: radial-gradient(
          circle at top right,
          rgba(212, 169, 67, 0.08) 0%,
          transparent 65%
        );
        border-radius: 0 22px 0 0;
        pointer-events: none;
      }
      .ci::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 90px;
        height: 90px;
        background: radial-gradient(
          circle at bottom left,
          rgba(80, 40, 180, 0.07) 0%,
          transparent 65%
        );
        border-radius: 0 0 0 22px;
        pointer-events: none;
      }

      .ai {
        opacity: 0;
        transform: translateY(20px);
        animation: sup 0.6s ease forwards;
      }
      @keyframes sup {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .sname {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2rem, 3.3vw, 3.2rem);
        font-weight: 700;
        color: var(--w);
        line-height: 1.1;
        margin-bottom: 6px;
        word-break: break-word;
      }
      .sttl {
        font-size: 1rem;
        color: var(--gold);
        letter-spacing: 0.04em;
        margin-bottom: 20px;
      }
      .sdiv {
        width: 100px;
        height: 1.5px;
        background: linear-gradient(90deg, var(--gold), transparent);
        margin-bottom: 20px;
      }
      .itbl {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 24px;
      }
      .irow {
        display: flex;
        align-items: baseline;
        gap: 10px;
        font-size: 0.93rem;
      }
      .ilbl {
        color: var(--wd);
        width: 90px;
        flex-shrink: 0;
        font-size: 0.9rem;
      }
      .idot {
        color: var(--gold);
        font-size: 0.65rem;
        opacity: 0.75;
      }
      .ival {
        color: var(--w);
        font-weight: 500;
        font-size: 1rem;
      }
      .db {
        background: linear-gradient(
          135deg,
          rgba(212, 169, 67, 0.1) 0%,
          rgba(212, 169, 67, 0.04) 100%
        );
        border: 1px solid rgba(212, 169, 67, 0.2);
        border-radius: 14px;
        padding: 18px 22px;
        position: relative;
        overflow: hidden;
      }
      .db::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(212, 169, 67, 0.45),
          transparent
        );
      }
      .dtag {
        font-size: 0.65rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 5px;
      }
      .dval {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--w);
        margin-bottom: 14px;
        font-family: "Cormorant Garamond", serif;
      }
      .mtag {
        font-size: 0.65rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 5px;
      }
      .mval {
        font-size: 0.9rem;
        color: var(--wm);
        font-style: italic;
        line-height: 1.6;
      }

      /* ── CONTROLS ── */
      .ctl {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 7px;
        /* Ganti fadeU menjadi fadeSimple agar properti transform tidak mengunci posisi tombol absolute */
        animation: fadeSimple 0.9s 0.4s ease both;
      }
      .crow {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .tr {
        position: relative;
        width: 40px;
        height: 40px;
        cursor: pointer;
      }
      .tr svg {
        transform: rotate(-90deg);
      }
      .tt {
        fill: none;
        stroke: rgba(212, 169, 67, 0.2);
        stroke-width: 2.5;
      }
      .tf {
        fill: none;
        stroke: var(--gold);
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-dasharray: 97;
        stroke-dashoffset: 97;
        transition: stroke-dashoffset 0.1s linear;
      }
      .ti {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.76rem;
        color: var(--gold);
        user-select: none;
      }
      .tr:hover .ti {
        color: var(--gold-lt);
      }
      .dots {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(212, 169, 67, 0.22);
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .dot.a {
        background: var(--gold);
        width: 20px;
        border-radius: 3px;
        box-shadow: 0 0 8px rgba(212, 169, 67, 0.55);
      }
      .cnt {
        font-size: 0.72rem;
        color: var(--wd);
        letter-spacing: 0.12em;
        min-width: 40px;
        text-align: center;
      }
      .hint {
        font-size: 0.64rem;
        color: rgba(245, 240, 232, 0.28);
        letter-spacing: 0.05em;
        text-align: center;
      }

      /* ── FULLSCREEN BUTTON ── */
      .fs-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid rgba(212, 169, 67, 0.35);
        background: rgba(212, 169, 67, 0.07);
        color: var(--gold);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(12px);
        transition: all 0.25s ease;
        flex-shrink: 0;
      }
      .fs-btn:hover {
        background: var(--gold);
        color: var(--bg);
        border-color: var(--gold);
        transform: scale(1.08);
        box-shadow: 0 0 22px var(--glow);
      }
      .fs-btn:active {
        transform: scale(0.95);
      }
      .fs-btn svg {
        width: 15px;
        height: 15px;
        pointer-events: none;
      }

      /* ── FULLSCREEN TOAST ── */
      #fs-toast {
        position: fixed;
        top: 22px;
        left: 50%;
        transform: translateX(-50%) translateY(-6px);
        background: rgba(212, 169, 67, 0.12);
        border: 1px solid rgba(212, 169, 67, 0.3);
        color: var(--gold-lt);
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 7px 18px;
        border-radius: 24px;
        backdrop-filter: blur(14px);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.3s ease,
          transform 0.3s ease;
        z-index: 300;
        white-space: nowrap;
      }
      #fs-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ── KEYFRAMES ── */
      @keyframes fadeD {
        from {
          opacity: 0;
          transform: translateY(-18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeU {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeSimple {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 786px) {
        .pg {
          padding: 14px 10px 12px;
        }
        .sz {
          gap: 8px;
        }
        /* .nb {
          width: 34px;
          height: 34px;
          font-size: 0.8rem;
          flex-shrink: 0;
        } */
        .card {
          flex-direction: column;
        }
        .cp {
          width: 100%;
          height: 230px;
          flex-shrink: 0;
        }
        .cdv {
          display: none;
        }
        .ci {
          padding: 16px 20px 20px;
        }
        .photo-wrap {
          width: 165px;
          height: 165px;
        }
        .sname {
          font-size: 1.75rem;
        }
        .sttl {
          font-size: 0.8rem;
        }
        .irow {
          font-size: 0.85rem;
        }
        .ilbl {
          width: 80px;
          font-size: 0.76rem;
        }
        .ival {
          font-size: 0.87rem;
        }
        .dval {
          font-size: 0.95rem;
        }
        .mval {
          font-size: 0.82rem;
        }
        .orbit {
          inset: -8px;
        }
        header h1 {
          font-size: 1.25rem;
        }
        .badge {
          font-size: 0.72rem;
          letter-spacing: 0.2em;
        }
        .db {
          padding: 14px 16px;
        }
        .itbl {
          gap: 8px;
          margin-bottom: 16px;
        }
        .hint {
          display: none;
        }

        /* 1. Atur tombol panah agar ukurannya pas di handphone */
        .nb {
          position: static !important;
          transform: none !important;
          width: 44px;
          height: 44px;
          background: rgba(212, 169, 67, 0.12) !important;

      /* ── SIDEBAR NAVIGATOR STYLE ── */

      /* Trigger saat aktif */
      .student-sidebar.open {

      .sidebar-header {

      .sidebar-close-btn {
        background: none;
        border: none;
        color: var(--w);
        font-size: 28px;
        cursor: pointer;
        opacity: 0.6;
        line-height: 1;
        transition:
          opacity 0.2s,
          color 0.2s;
      }

        opacity: 1;

      /* Area List Nama (Scrollable) */
      .sidebar-list {

      .sidebar-list li {

      .sidebar-list li::before {

      .sidebar-list li:hover {

      /* Indikator Siswa yang sedang Aktif dilayar */
      .sidebar-list li.active {

      /* Lapisan Blur Gelap di Belakang Sidebar */

      /* ── RESPONSIVE MOBILE TWEAKS ── */
      @media (max-width: 600px) {

    </style>
  </head>
  <body>
    <canvas id="cv"></canvas>
    <div class="aurora"></div>
    <div id="flash"></div>
    <div id="fs-toast"></div>

    <div class="pg">
      <header>

      <div class="ctl">
        <div class="crow">

          <!-- Auto-play timer -->
          <div class="tr" id="trEl" title="Auto-play (Spasi)">

          &nbsp;·&nbsp; F11 Fullscreen
        </p>
      </div>
    </div>

    <button
      id="nav-toggle"
      class="nav-toggle-btn"
      aria-label="Buka Daftar Siswa"
    >
      <span class="arrow-icon">‹</span>
    </button>

    <div id="student-sidebar" class="student-sidebar">
      <div class="sidebar-header">
        <h3>Daftar Siswa</h3>
        <button id="sidebar-close" class="sidebar-close-btn">&times;</button>
      </div>
      <ul id="sidebar-list" class="sidebar-list"></ul>
    </div>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <script>
      /* ── STARFIELD ── */
      (function () {
        const c = document.getElementById("cv"),
          ctx = c.getContext("2d");
        let W,
          H,
          stars = [];
        function rsz() {
          W = c.width = innerWidth;
          H = c.height = innerHeight;
        }
        function mk() {
          return {
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.4 + 0.25,
            a: Math.random(),
            da: (Math.random() - 0.5) * 0.007,
            vy: Math.random() * 0.13 + 0.04,
            gold: Math.random() < 0.13,
          };
        }
        function init() {
          stars = Array.from({ length: 190 }, mk);
        }
        function draw() {
          ctx.clearRect(0, 0, W, H);
          stars.forEach((s) => {
            s.a += s.da;
            if (s.a <= 0 || s.a >= 1) s.da *= -1;
            s.y -= s.vy;
            if (s.y + s.r < 0) {
              s.y = H + s.r;
              s.x = Math.random() * W;
            }
            ctx.save();
            ctx.globalAlpha = s.a * 0.9;
            ctx.fillStyle = s.gold ? "#F5D780" : "#FFFFFF";
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          });
          requestAnimationFrame(draw);
        }
        rsz();
        init();
        draw();
        window.addEventListener("resize", () => {
          rsz();
          init();
        });
      })();

      /* ── DATA ── */
      const GRADS = [
        ["#0c1a3a", "#0d3d68"],
        ["#180c3a", "#2a1265"],
        ["#0c321c", "#0c5430"],
        ["#2a1800", "#563200"],
        ["#0c3535", "#0c5050"],
        ["#270c34", "#4c0e62"],
        ["#001828", "#003252"],
        ["#261200", "#4e2700"],
      ];

      let students = [],
        cur = 0,
        transitioning = false,
        navDir = "next";
      let ap = false,
        tRaf = null,
        tStart = null,
        tElapsed = 0;
      const AUTO = 15000,
        CIRC = 2 * Math.PI * 16.5;
      const flipState = {};

      async function load() {
        try {
          const r = await fetch("data.json");
          students = await r.json();
        } catch {
          students = [
            {
              nama: "Ahmad Fauzi",
              ttl: "Palembang, 15 Maret 2014",
              namaAyah: "Budi Santoso",
              namaIbu: "Sri Wahyuni",
              citaCita: "Dokter Spesialis Anak",
              pesan:
                "Jadilah orang yang bermanfaat bagi sesama dan bangsa Indonesia.",
              foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Ahmad&backgroundColor=b6e3f4",
              fotoCita:
                "https://api.dicebear.com/7.x/avataaars/svg?seed=AhmadDoc&backgroundColor=e8f4e8&accessories=prescription02&clothingColor=3c4f5c&top=shortHairShortFlat&clothing=blazerAndShirt",
            },
            {
              nama: "Siti Rahmawati",
              ttl: "Totorejo, 22 Juli 2014",
              namaAyah: "Rahmat Hidayat",
              namaIbu: "Nurul Fadilah",
              citaCita: "Guru Bahasa Inggris",
              pesan:
                "Terus belajar dan jangan pernah menyerah pada mimpi-mimpimu.",
              foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Siti&backgroundColor=ffdfbf",
              fotoCita:
                "https://api.dicebear.com/7.x/avataaars/svg?seed=SitiGuru&backgroundColor=fff0e0&clothing=blazerAndSweater&clothingColor=a04010",
            },
            {
              nama: "Muhammad Rizky",
              ttl: "Totorejo, 01 Januari 2014",
              namaAyah: "Hendra Gunawan",
              namaIbu: "Yanti Kurniawati",
              citaCita: "Insinyur Sipil",
              pesan:
                "Kerja keras, doa, dan kesabaran adalah kunci sukses sejati.",
              foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Rizky&backgroundColor=c0aede",
              fotoCita:
                "https://api.dicebear.com/7.x/avataaars/svg?seed=RizkyEng&backgroundColor=d0c8f0&clothing=blazerAndShirt&clothingColor=262e33",
            },
            {
              nama: "Dewi Lestari",
              ttl: "Lubuklinggau, 08 April 2014",
              namaAyah: "Agus Prasetyo",
              namaIbu: "Rina Oktaviani",
              citaCita: "Arsitek Ternama",
              pesan:
                "Mimpi setinggi langit, tapi tetap berpijak di bumi yang memberimu akar.",
              foto: "https://api.dicebear.com/7.x/avataaars/svg?seed=Dewi&backgroundColor=d1f4d1",
              fotoCita:
                "https://api.dicebear.com/7.x/avataaars/svg?seed=DewiArch&backgroundColor=c8f0c8&clothing=blazerAndSweater&clothingColor=5c3317",
            },
          ];
        }
        build();
        buildDots();
        renderSidebarNav();
        show(0, true);
        setTimeout(() => autoFlipActive(), 7000);
      }

      /* ── BUILD ── */
      function build() {
        const vp = document.getElementById("vp");
        vp.innerHTML = "";
        students.forEach((s, i) => {
          flipState[i] = false;
          const [g1, g2] = GRADS[i % GRADS.length];
          const el = document.createElement("div");
          el.className = "card from-right";
          el.dataset.i = i;
          el.innerHTML = `
<div class="cp" style="background:linear-gradient(148deg,${g1},${g2})">
  <div class="photo-wrap">
    <div class="orbit"></div>
    <div class="ring-spin"></div>
    <canvas class="pcv" width="270" height="270" data-ci="${i}"></canvas>
    <div class="flip-scene" data-fi="${i}" title="Klik untuk lihat masa depan ✨">
      <div class="flip-front">
        <img src="${s.foto}" alt="${s.nama}" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(s.nama)}&fontSize=38'">
      </div>
      <div class="flip-back">
        <img src="${s.fotoCita || s.foto}" alt="${s.nama} — ${s.citaCita}" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(s.nama)}&fontSize=38'">
      </div>
    </div>
    <div class="photo-badge">
      <div class="pb-dot pa" data-pi="${i}" data-side="0" title="Foto sekarang"></div>
      <div class="pb-dot" data-pi="${i}" data-side="1" title="Foto masa depan"></div>
    </div>
    <div class="photo-label" id="plbl-${i}">Foto Sekarang</div>
  </div>

</div>
<div class="cdv"></div>
<div class="ci">
  <h2 class="sname ai" style="animation-delay:.05s">${s.nama}</h2>
  <p class="sttl ai" style="animation-delay:.13s">${s.ttl}</p>
  <div class="sdiv ai" style="animation-delay:.5s"></div>
  <div class="itbl">
    <div class="irow ai" style="animation-delay:.5s">
      <span class="ilbl">Nama Ayah</span><span class="idot">&#9670;</span><span class="ival">${s.namaAyah}</span>
    </div>
    <div class="irow ai" style="animation-delay:.34s">
      <span class="ilbl">Nama Ibu</span><span class="idot">&#9670;</span><span class="ival">${s.namaIbu}</span>
    </div>
  </div>
  <div class="db ai" style="animation-delay:.42s">
    <p class="dtag">&#10022; Cita-cita</p>
    <p class="dval">${s.citaCita}</p>
    <p class="mtag">&#10022; Pesan</p>
    <p class="mval">"${s.pesan}"</p>
  </div>
</div>`;
          //   el.addEventListener("mousemove", tilt);
          //   el.addEventListener("mouseleave", untilt);
          vp.appendChild(el);
        });
        document.querySelectorAll(".flip-scene").forEach((fs) => {
          fs.addEventListener("click", () => doFlip(parseInt(fs.dataset.fi)));
        });
        document.querySelectorAll(".pb-dot").forEach((d) => {
          d.addEventListener("click", (e) => {
            e.stopPropagation();
            const idx = parseInt(d.dataset.pi),
              side = parseInt(d.dataset.side);
            if (flipState[idx] !== (side === 1)) doFlip(idx);
          });
        });
      }

      /* ── REFACTOR FUNGSI FLIP (Bebas Patah-Patah) ── */
      /* ── FUNGSI FADE SUPER RINGAN ── */
      function doFlip(idx) {
        flipState[idx] = !flipState[idx];
        const flipped = flipState[idx];
        const scene = document.querySelector(`.flip-scene[data-fi="${idx}"]`);
        const lbl = document.getElementById(`plbl-${idx}`);
        const dots = document.querySelectorAll(`.pb-dot[data-pi="${idx}"]`);

        if (!scene) return;

        // Terapkan efek fade lewat CSS class
        scene.classList.toggle("flipped", flipped);

        // Ganti teks label dengan efek memudar menyesuaikan durasi foto
        if (lbl) {
          lbl.style.opacity = "0";
          setTimeout(() => {
            lbl.textContent = flipped ? "Foto Masa Depan ✦" : "Foto Sekarang";
            lbl.style.opacity = "1";
          }, 1000); // Teks berganti tepat di pertengahan efek fade
        }

        // Pindahkan indikator titik aktif
        dots.forEach((d, i) =>
          d.classList.toggle("pa", flipped ? i === 1 : i === 0),
        );
      }

      function autoFlipActive() {
        if (flipState[cur] === false) doFlip(cur);
      }

      /* ── TILT ── */
      function tilt(e) {
        const c = e.currentTarget,
          r = c.getBoundingClientRect();
        const mx = (e.clientX - r.left) / r.width - 0.5,
          my = (e.clientY - r.top) / r.height - 0.5;
        c.style.transform = `perspective(1200px) rotateY(${mx * 7}deg) rotateX(${-my * 5}deg) scale(1.012)`;
        c.style.transition = "transform .12s ease";
      }
      function untilt(e) {
        e.currentTarget.style.transform = "";
        e.currentTarget.style.transition = "transform .6s ease";
      }

      /* ── DOTS ── */
      function buildDots() {
        const el = document.getElementById("dotsEl");
        el.innerHTML = "";
        if (students.length <= 16) {
          students.forEach((_, i) => {
            const d = document.createElement("div");
            d.className = "dot";
            d.addEventListener("click", () => goto(i));
            el.appendChild(d);
          });
        }
      }
      function updDots() {
        document
          .querySelectorAll(".dot")
          .forEach((d, i) => d.classList.toggle("a", i === cur));
        document.getElementById("cntEl").textContent =
          `${cur + 1} / ${students.length}`;
      }

      /* ── SHOW ── */
      function show(idx, init = false) {
        const cards = document.querySelectorAll(".card");
        cards.forEach((c, i) => {
          if (i === idx) {
            c.classList.remove(
              "to-left",
              "to-right",
              "from-right",
              "from-left",
            );
            if (!init) {
              c.classList.add(navDir === "next" ? "from-right" : "from-left");
              void c.offsetWidth;
            }
            c.classList.add("active");
            replayAnim(c);
            if (flipState[i] === true) {
              flipState[i] = false;
              resetFlip(i);
            }
            setTimeout(() => {
              if (cur === i) autoFlipActive();
            }, 7000);
          } else {
            c.classList.remove("active", "from-right", "from-left");
          }
        });
        updDots();
      }
      function resetFlip(idx) {
        const scene = document.querySelector(`.flip-scene[data-fi="${idx}"]`);
        const lbl = document.getElementById(`plbl-${idx}`);
        const dots = document.querySelectorAll(`.pb-dot[data-pi="${idx}"]`);
        if (scene) scene.classList.remove("flipped");
        if (lbl) lbl.textContent = "Foto Sekarang";
        dots.forEach((d, i) => d.classList.toggle("pa", i === 0));
      }
      function replayAnim(card) {
        card.querySelectorAll(".ai").forEach((el) => {
          el.style.animation = "none";
          void el.offsetHeight;
          el.style.animation = "";
        });
      }

      /* ── NAVIGATE ── */
      function goto(idx) {
        if (transitioning || idx === cur) return;
        transitioning = true;
        navDir = idx > cur ? "next" : "prev";
        const prev = cur;
        cur = idx;
        // const fl = document.getElementById("flash");
        // fl.style.transition = "none";
        // fl.style.opacity = "1";
        // setTimeout(() => {
        //   fl.style.transition = "opacity 0.5s ease";
        //   fl.style.opacity = "0";
        // }, 1500);
        const cards = document.querySelectorAll(".card");
        cards[prev].classList.remove("active");
        cards[prev].classList.add(navDir === "next" ? "to-left" : "to-right");
        setTimeout(() => {
          cards[prev].classList.remove("to-left", "to-right");
          transitioning = false;
        }, 2500);
        setTimeout(() => show(cur), 1000);
        if (ap) restartTimer();
      }
      function chg(d) {
        const n = students.length;
        goto((cur + d + n) % n);
        if (typeof updateSidebarActive === "function") {
          updateSidebarActive();
        }
      }

      /* ── AUTOPLAY ── */
      const tfEl = document.getElementById("tfEl"),
        tiEl = document.getElementById("tiEl");
      tfEl.style.strokeDasharray = CIRC;
      tfEl.style.strokeDashoffset = CIRC;
      function toggleAP() {
        ap = !ap;
        tiEl.innerHTML = ap ? "&#9646;&#9646;" : "&#9654;";
        if (ap) startTimer();
        else {
          stopTimer();
          tfEl.style.strokeDashoffset = CIRC;
        }
      }
      function startTimer() {
        tStart = performance.now() - tElapsed;
        tRaf = requestAnimationFrame(tickTimer);
      }
      function stopTimer() {
        if (tRaf !== null) {
          cancelAnimationFrame(tRaf);
          tRaf = null;
        }
      }
      function restartTimer() {
        stopTimer();
        tElapsed = 0;
        tfEl.style.strokeDashoffset = CIRC;
        if (ap) startTimer();
      }
      function tickTimer() {
        const now = performance.now();
        tElapsed = now - tStart;
        const p = Math.min(tElapsed / AUTO, 1);
        tfEl.style.strokeDashoffset = CIRC * (1 - p);
        if (p >= 1) {
          chg(1);
          //   tElapsed = 0;
          //   tStart = performance.now();
          //   tRaf = requestAnimationFrame(tickTimer);
          return;
        }
        if (ap) {
          tRaf = requestAnimationFrame(tickTimer);
        }
      }
      document.getElementById("trEl").addEventListener("click", toggleAP);

      /* ════════════════════════════════════════
         ── FULLSCREEN ──
         Shortcut : F11  (keyboard)
         Tombol   : fsBtn (klik)
      ════════════════════════════════════════ */
      const fsBtn = document.getElementById("fsBtn");
      const fsIcon = document.getElementById("fsIcon");
      const fsToast = document.getElementById("fs-toast");

      /* SVG paths untuk dua state */
      const ICON_ENTER = "M1 5V1h4M10 1h4v4M14 10v4h-4M5 14H1v-4"; /* expand */
      const ICON_EXIT = "M5 1v4H1M9 1v4h4M9 13v-4h4M5 13v-4H1"; /* compress */

      let toastTimer = null;
      function showToast(msg) {
        fsToast.textContent = msg;
        fsToast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => fsToast.classList.remove("show"), 2200);
      }

      function updateFsIcon() {
        const isFs = !!document.fullscreenElement;
        fsIcon
          .querySelector("path")
          .setAttribute("d", isFs ? ICON_EXIT : ICON_ENTER);
        fsBtn.title = isFs
          ? "Keluar Fullscreen (F11 / Esc)"
          : "Fullscreen (F11)";
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement
            .requestFullscreen({ navigationUI: "hide" })
            .then(() => showToast("✦ Fullscreen — tekan Esc untuk keluar"))
            .catch(() => showToast("Fullscreen tidak didukung browser ini"));
        } else {
          document.exitFullscreen().then(() => showToast("Keluar Fullscreen"));
        }
      }

      fsBtn.addEventListener("click", toggleFullscreen);

      document.addEventListener("fullscreenchange", updateFsIcon);
      document.addEventListener("webkitfullscreenchange", updateFsIcon);

      /* ── KEYBOARD ── */
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight" || e.key === "ArrowDown") chg(1);
        else if (e.key === "ArrowLeft" || e.key === "ArrowUp") chg(-1);
        else if (e.key === " ") {
          e.preventDefault();
          toggleAP();
        } else if (e.key === "f" || e.key === "F") doFlip(cur);
        else if (e.key === "F11") {
          e.preventDefault();
          toggleFullscreen();
        }
      });

      /* ── TOUCH ── */
      let tx0 = 0;
      const vpEl = document.getElementById("vp");
      vpEl.addEventListener("touchstart", (e) => (tx0 = e.touches[0].clientX), {
        passive: true,
      });
      vpEl.addEventListener(
        "touchend",
        (e) => {
          const dx = e.changedTouches[0].clientX - tx0;
          if (Math.abs(dx) > 50) chg(dx < 0 ? 1 : -1);
        },
        { passive: true },
      );

      document.getElementById("pBtn").addEventListener("click", () => chg(-1));
      document.getElementById("nBtn").addEventListener("click", () => chg(1));

      load();

      /* ── LOGIKA SIDEBAR NAVIGATOR ── */
      const navToggle = document.getElementById("nav-toggle");
      const sidebar = document.getElementById("student-sidebar");
      const sidebarClose = document.getElementById("sidebar-close");
      const sidebarOverlay = document.getElementById("sidebar-overlay");
      const sidebarList = document.getElementById("sidebar-list");

      // Fungsi Buka / Tutup Menu
      function toggleSidebar() {
        const isOpen = sidebar.classList.toggle("open");
        sidebarOverlay.classList.toggle("open", isOpen);
        // Sembunyikan tombol kecil pemicu saat menu terbuka agar bersih
        navToggle.style.transform = isOpen
          ? "translateY(-50%) translateX(100%)"
          : "translateY(-50%)";
      }

      navToggle.addEventListener("click", toggleSidebar);
      sidebarClose.addEventListener("click", toggleSidebar);
      sidebarOverlay.addEventListener("click", toggleSidebar);

      // Render Otomatis Nama Siswa ke Sidebar
      function renderSidebarNav() {
        sidebarList.innerHTML = "";

        // Menggunakan variabel 'students' sesuai dengan kode Anda
        if (typeof students !== "undefined" && Array.isArray(students)) {
          students.forEach((item, idx) => {
            const li = document.createElement("li");
            li.textContent = item.nama || `Siswa ${idx + 1}`;
            li.setAttribute("data-idx", idx);

            if (idx === cur) li.classList.add("active");

            // Mekanisme Lompat ke Foto Siswa Pilihan
            li.addEventListener("click", () => {
              if (idx !== cur) {
                const diff = idx - cur;
                chg(diff); // Memanggil fungsi perubahan slide bawaan kode Anda
              }
              toggleSidebar(); // Otomatis tutup sidebar setelah memilih
            });

            sidebarList.appendChild(li);
          });
        }
      }

      // Fungsi untuk meng-update status 'active' di sidebar saat user klik tombol next/prev bawaan
      function updateSidebarActive() {
        const items = sidebarList.querySelectorAll("li");
        items.forEach((item, idx) => {
          item.classList.toggle("active", idx === cur);
        });
      }
    </script>
  </body>
</html>
