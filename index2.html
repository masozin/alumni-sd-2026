<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pelepasan Kelas VI — SDN 01 Totorejo 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Syne:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #f5f0e8;
        --gold: #c9a84c;
        --gold-lt: #e8c97a;
        --gold-glow: rgba(201, 168, 76, 0.3);
        --ink: #0a0a0f;
        --ink2: #11111a;
        --glass: rgba(10, 10, 15, 0.55);
        --glass2: rgba(10, 10, 15, 0.85);
        --muted: rgba(245, 240, 232, 0.5);
        --border: rgba(201, 168, 76, 0.25);
      }
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: "Syne", sans-serif;
        background: var(--ink);
        color: var(--cream);
        cursor: default;
      }

      /* ══════════════════════════════════════
         NOISE TEXTURE OVERLAY
      ══════════════════════════════════════ */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.025;
        pointer-events: none;
      }

      /* ══════════════════════════════════════
         CANVAS STARFIELD
      ══════════════════════════════════════ */
      #cv {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      /* ══════════════════════════════════════
         WELCOME GATE
      ══════════════════════════════════════ */
      #gateScreen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 0;
        transition:
          opacity 1.2s ease,
          visibility 1.2s ease;
      }
      #gateScreen.out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .gate-ornament {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 60% 70% at 50% 50%,
          rgba(201, 168, 76, 0.05) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .gate-ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(201, 168, 76, 0.08);
        animation: slowSpin 80s linear infinite;
      }
      .gate-ring:nth-child(1) {
        width: 600px;
        height: 600px;
      }
      .gate-ring:nth-child(2) {
        width: 900px;
        height: 900px;
        animation-direction: reverse;
        animation-duration: 120s;
        border-style: dashed;
      }
      @keyframes slowSpin {
        to {
          transform: rotate(360deg);
        }
      }

      .gate-inner {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 40px;
      }

      .gate-school-name {
        font-family: "Syne", sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 28px;
        opacity: 0;
        animation: gFadeUp 1s ease 0.3s forwards;
      }

      .gate-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(3rem, 7vw, 6rem);
        font-weight: 900;
        line-height: 1;
        color: var(--cream);
        opacity: 0;
        animation: gFadeUp 1s ease 0.6s forwards;
      }
      .gate-title em {
        font-style: italic;
        font-weight: 400;
        color: var(--gold-lt);
        display: block;
      }

      .gate-line {
        width: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
        margin: 28px auto;
        animation: gLine 1.2s ease 1s forwards;
      }
      @keyframes gLine {
        to {
          width: 200px;
        }
      }

      .gate-year {
        font-size: 0.8rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--muted);
        opacity: 0;
        animation: gFadeUp 1s ease 1.3s forwards;
      }

      .gate-btn {
        margin-top: 48px;
        padding: 16px 48px;
        font-family: "Syne", sans-serif;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--ink);
        background: var(--gold);
        border: none;
        border-radius: 2px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all 0.4s ease;
        opacity: 0;
        animation: gFadeUp 1s ease 1.6s forwards;
      }
      .gate-btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transform: translateX(-100%);
        transition: transform 0.6s ease;
      }
      .gate-btn:hover {
        background: var(--gold-lt);
        transform: translateY(-2px);
        box-shadow: 0 12px 40px var(--gold-glow);
      }
      .gate-btn:hover::after {
        transform: translateX(100%);
      }

      @keyframes gFadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ══════════════════════════════════════
         INTRO CINEMATIC
      ══════════════════════════════════════ */
      #introScreen {
        position: fixed;
        inset: 0;
        z-index: 8888;
        background: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.8s ease,
          visibility 0.8s ease;
      }
      #introScreen.active {
        opacity: 1;
        visibility: visible;
      }
      #introScreen.out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .intro-words {
        text-align: center;
        position: relative;
        z-index: 2;
      }
      .intro-word {
        display: block;
        font-family: "Playfair Display", serif;
        font-size: clamp(2rem, 5vw, 4.5rem);
        font-style: italic;
        font-weight: 400;
        color: var(--cream);
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 0.9s ease,
          transform 0.9s ease;
        line-height: 1.3;
      }
      .intro-word.vis {
        opacity: 1;
        transform: translateY(0);
      }
      .intro-word span {
        color: var(--gold-lt);
        font-style: normal;
        font-weight: 700;
      }

      /* ══════════════════════════════════════
         MAIN STAGE — FULLSCREEN IMMERSIVE
      ══════════════════════════════════════ */
      #stage {
        position: fixed;
        inset: 0;
        z-index: 10;
        opacity: 0;
        transition: opacity 1.2s ease;
        overflow: hidden;
      }
      #stage.vis {
        opacity: 1;
      }

      /* School logos pinned corners */
      .logo-pin {
        position: absolute;
        z-index: 100;
        pointer-events: none;
      }
      .logo-pin.tl {
        top: 24px;
        left: 32px;
      }
      .logo-pin.tr {
        top: 24px;
        right: 32px;
      }
      .logo-pin img {
        width: 44px;
        height: auto;
        filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.5));
      }

      /* Top header strip */
      .stage-header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        padding: 20px 140px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          to bottom,
          rgba(10, 10, 15, 0.9) 0%,
          transparent 100%
        );
      }
      .stage-header-inner {
        text-align: center;
      }
      .stage-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(1rem, 1.5vw, 1.4rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--cream);
      }
      .stage-subtitle {
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--gold);
        margin-top: 2px;
      }

      /* ══════════════════════════════════════
         SLIDES
      ══════════════════════════════════════ */
      .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1),
          visibility 1.2s;
      }
      .slide.active {
        opacity: 1;
        visibility: visible;
        pointer-events: all;
      }

      /* ── BG PHOTO (full bleed) ── */
      .slide-bg {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center top;
      }
      .slide-bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            to right,
            rgba(10, 10, 15, 0.92) 38%,
            rgba(10, 10, 15, 0.3) 65%,
            rgba(10, 10, 15, 0.55) 100%
          ),
          linear-gradient(to top, rgba(10, 10, 15, 0.7) 0%, transparent 40%);
      }

      /* ── CONTENT PANEL (left side) ── */
      .slide-content {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        width: 52%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 80px 56px 80px 72px;
        z-index: 10;
      }

      /* Number badge */
      .s-num {
        font-family: "Playfair Display", serif;
        font-size: clamp(5rem, 10vw, 9rem);
        font-weight: 900;
        line-height: 1;
        color: transparent;
        -webkit-text-stroke: 1px rgba(201, 168, 76, 0.15);
        position: absolute;
        top: 60px;
        left: 52px;
        user-select: none;
        pointer-events: none;
        font-style: italic;
      }

      .s-tag {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.45em;
        text-transform: uppercase;
        color: var(--gold);
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        opacity: 0;
        transform: translateX(-20px);
        transition:
          opacity 0.6s ease 0.1s,
          transform 0.6s ease 0.1s;
      }
      .s-tag::before {
        content: "";
        width: 28px;
        height: 1px;
        background: var(--gold);
        flex-shrink: 0;
      }

      .s-name {
        font-family: "Playfair Display", serif;
        font-size: clamp(2.2rem, 4vw, 3.8rem);
        font-weight: 900;
        line-height: 1.05;
        color: var(--cream);
        margin-bottom: 8px;
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.7s ease 0.2s,
          transform 0.7s ease 0.2s;
      }

      .s-ttl {
        font-family: "Lora", serif;
        font-size: 0.88rem;
        font-style: italic;
        color: var(--muted);
        margin-bottom: 28px;
        opacity: 0;
        transform: translateY(16px);
        transition:
          opacity 0.7s ease 0.3s,
          transform 0.7s ease 0.3s;
      }

      .s-divider {
        width: 0;
        height: 1px;
        background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
        margin-bottom: 24px;
        transition: width 0.8s ease 0.4s;
      }

      .s-meta {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 28px;
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 0.6s ease 0.5s,
          transform 0.6s ease 0.5s;
      }
      .s-meta-row {
        display: grid;
        grid-template-columns: 90px 12px 1fr;
        align-items: baseline;
        gap: 4px;
      }
      .s-meta-lbl {
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .s-meta-sep {
        color: var(--gold);
        font-size: 0.55rem;
      }
      .s-meta-val {
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--cream);
      }

      /* Dream box */
      .s-dream {
        background: var(--glass);
        border: 1px solid var(--border);
        border-left: 3px solid var(--gold);
        border-radius: 2px;
        padding: 18px 22px;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        margin-bottom: 20px;
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 0.6s ease 0.6s,
          transform 0.6s ease 0.6s;
        position: relative;
        overflow: hidden;
      }
      .s-dream::before {
        content: "✦";
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.4rem;
        color: rgba(201, 168, 76, 0.08);
        pointer-events: none;
      }
      .s-dream-lbl {
        font-size: 0.6rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 4px;
      }
      .s-dream-val {
        font-family: "Playfair Display", serif;
        font-size: clamp(1.1rem, 1.6vw, 1.4rem);
        font-weight: 700;
        color: var(--cream);
        margin-bottom: 10px;
      }
      .s-dream-msg-lbl {
        font-size: 0.6rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 4px;
      }
      .s-dream-msg {
        font-family: "Lora", serif;
        font-size: 0.85rem;
        font-style: italic;
        color: var(--muted);
        line-height: 1.65;
      }

      /* ── PHOTO FRAME (right side) ── */
      .slide-photo {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        width: 52%;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Animated entrance states */
      .slide.active .s-tag {
        opacity: 1;
        transform: none;
      }
      .slide.active .s-name {
        opacity: 1;
        transform: none;
      }
      .slide.active .s-ttl {
        opacity: 1;
        transform: none;
      }
      .slide.active .s-divider {
        width: 120px;
      }
      .slide.active .s-meta {
        opacity: 1;
        transform: none;
      }
      .slide.active .s-dream {
        opacity: 1;
        transform: none;
      }

      /* ── PORTRAIT FRAME ── */
      .portrait-wrap {
        position: relative;
        opacity: 0;
        transform: scale(0.92);
        transition:
          opacity 0.9s ease 0.3s,
          transform 0.9s cubic-bezier(0.34, 1.2, 0.64, 1) 0.3s;
      }
      .slide.active .portrait-wrap {
        opacity: 1;
        transform: scale(1);
      }

      .portrait-frame {
        width: clamp(240px, 28vw, 360px);
        height: clamp(300px, 36vw, 460px);
        position: relative;
        border-radius: 2px;
        overflow: hidden;
        cursor: pointer;
      }

      .portrait-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition:
          opacity 1.6s ease,
          transform 1.6s ease;
      }
      .portrait-img.back {
        position: absolute;
        inset: 0;
        opacity: 0;
        transform: scale(1.06);
      }
      .portrait-frame.flipped .portrait-img.front {
        opacity: 0;
        transform: scale(0.96);
      }
      .portrait-frame.flipped .portrait-img.back {
        opacity: 1;
        transform: scale(1);
      }

      /* Decorative frame borders */
      .portrait-frame::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 10;
        border: 1px solid rgba(201, 168, 76, 0.35);
        pointer-events: none;
      }

      /* Corner ornaments */
      .portrait-corners {
        position: absolute;
        inset: -8px;
        z-index: 11;
        pointer-events: none;
      }
      .portrait-corners::before,
      .portrait-corners::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
      }
      .portrait-corners::before {
        top: 8px;
        left: 8px;
        border-top: 2px solid var(--gold);
        border-left: 2px solid var(--gold);
      }
      .portrait-corners::after {
        bottom: 8px;
        right: 8px;
        border-bottom: 2px solid var(--gold);
        border-right: 2px solid var(--gold);
      }

      /* Extra corners via pseudo on wrap */
      .portrait-extra-corners::before,
      .portrait-extra-corners::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        z-index: 11;
      }
      .portrait-extra-corners::before {
        top: 0;
        right: 0;
        border-top: 2px solid var(--gold);
        border-right: 2px solid var(--gold);
      }
      .portrait-extra-corners::after {
        bottom: 0;
        left: 0;
        border-bottom: 2px solid var(--gold);
        border-left: 2px solid var(--gold);
      }

      /* Flip hint badge */
      .flip-hint {
        position: absolute;
        bottom: -36px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.62rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--gold);
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .flip-hint::before,
      .flip-hint::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(201, 168, 76, 0.3);
        width: 24px;
      }

      /* Photo label */
      .photo-state-label {
        position: absolute;
        top: -30px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.62rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
        white-space: nowrap;
        transition: opacity 0.4s ease;
      }

      /* ══════════════════════════════════════
         CLOSING SLIDE
      ══════════════════════════════════════ */
      .slide-closing {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        text-align: center;
        padding: 40px;
        background: radial-gradient(
          ellipse 70% 70% at 50% 50%,
          rgba(201, 168, 76, 0.04) 0%,
          transparent 70%
        );
      }

      .closing-badge {
        font-size: 0.65rem;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 20px;
        opacity: 0;
        animation: none;
      }
      .slide.active .closing-badge {
        opacity: 1;
        transition: opacity 0.6s ease 0.3s;
      }

      .closing-title {
        font-family: "Playfair Display", serif;
        font-size: clamp(3rem, 7vw, 6rem);
        font-weight: 900;
        line-height: 1;
        opacity: 0;
      }
      .closing-title em {
        font-style: italic;
        font-weight: 400;
        color: var(--gold-lt);
        display: block;
      }
      .slide.active .closing-title {
        opacity: 1;
        transition:
          opacity 0.8s ease 0.5s,
          transform 0.8s ease 0.5s;
      }

      .closing-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 28px 0;
        opacity: 0;
      }
      .closing-divider span {
        color: var(--gold);
        font-size: 0.8rem;
      }
      .closing-divider::before,
      .closing-divider::after {
        content: "";
        flex: 1;
        max-width: 80px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold));
      }
      .closing-divider::after {
        background: linear-gradient(90deg, var(--gold), transparent);
      }
      .slide.active .closing-divider {
        opacity: 1;
        transition: opacity 0.6s ease 0.8s;
      }

      .closing-quote {
        font-family: "Lora", serif;
        font-size: clamp(0.9rem, 1.4vw, 1.1rem);
        font-style: italic;
        line-height: 1.8;
        color: var(--muted);
        max-width: 560px;
        opacity: 0;
      }
      .slide.active .closing-quote {
        opacity: 1;
        transition: opacity 0.8s ease 1s;
      }

      .closing-school {
        margin-top: 36px;
        opacity: 0;
      }
      .closing-school-name {
        font-family: "Playfair Display", serif;
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--cream);
      }
      .closing-school-year {
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--gold);
        margin-top: 4px;
      }
      .slide.active .closing-school {
        opacity: 1;
        transition: opacity 0.6s ease 1.2s;
      }

      /* ══════════════════════════════════════
         CONTROLS BOTTOM BAR
      ══════════════════════════════════════ */
      .controls {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 60;
        padding: 20px 48px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(
          to top,
          rgba(10, 10, 15, 0.95) 0%,
          transparent 100%
        );
      }

      /* Left: counter */
      .ctrl-counter {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 80px;
      }
      .ctrl-num {
        font-family: "Playfair Display", serif;
        font-size: 1.8rem;
        font-weight: 900;
        font-style: italic;
        color: var(--gold);
        line-height: 1;
      }
      .ctrl-total {
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        color: var(--muted);
      }
      .ctrl-total-n {
        display: block;
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--muted);
      }

      /* Center: dots + autoplay */
      .ctrl-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        flex: 1;
        max-width: 400px;
      }
      .dots-row {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 300px;
      }
      .dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: rgba(201, 168, 76, 0.2);
        cursor: pointer;
        transition: all 0.35s ease;
        flex-shrink: 0;
      }
      .dot.a {
        width: 18px;
        border-radius: 2px;
        background: var(--gold);
        box-shadow: 0 0 8px var(--gold-glow);
      }

      .autoplay-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .ap-ring {
        width: 36px;
        height: 36px;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
      }
      .ap-ring svg {
        transform: rotate(-90deg);
      }
      .ap-ring-track {
        fill: none;
        stroke: rgba(201, 168, 76, 0.15);
        stroke-width: 2;
      }
      .ap-ring-fill {
        fill: none;
        stroke: var(--gold);
        stroke-width: 2;
        stroke-linecap: round;
        stroke-dasharray: 88;
        stroke-dashoffset: 88;
        transition: stroke-dashoffset 0.1s linear;
      }
      .ap-icon {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.65rem;
        color: var(--gold);
        user-select: none;
      }
      .ctrl-hint {
        font-size: 0.6rem;
        letter-spacing: 0.08em;
        color: rgba(245, 240, 232, 0.2);
      }

      /* Right: nav + fullscreen */
      .ctrl-right {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 80px;
        justify-content: flex-end;
      }
      .nav-btn {
        width: 40px;
        height: 40px;
        border-radius: 2px;
        border: 1px solid var(--border);
        background: var(--glass);
        color: var(--cream);
        font-size: 0.85rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.25s ease;
        backdrop-filter: blur(12px);
      }
      .nav-btn:hover {
        background: var(--gold);
        color: var(--ink);
        border-color: var(--gold);
      }
      .nav-btn:active {
        transform: scale(0.93);
      }
      .nav-btn svg {
        width: 12px;
        height: 12px;
        stroke: currentColor;
        stroke-width: 2.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* ══════════════════════════════════════
         SIDEBAR NAVIGATOR
      ══════════════════════════════════════ */
      .sidebar-toggle {
        position: fixed;
        left: 0;
        top: 50%;
        z-index: 200;
        transform: translateY(-50%);
        width: 28px;
        height: 60px;
        background: var(--glass2);
        border: 1px solid var(--border);
        border-left: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--gold);
        font-size: 0.7rem;
        backdrop-filter: blur(12px);
        transition: all 0.3s ease;
      }
      .sidebar-toggle:hover {
        background: var(--gold);
        color: var(--ink);
        width: 34px;
      }

      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 300;
        width: 260px;
        background: var(--glass2);
        border-right: 1px solid var(--border);
        backdrop-filter: blur(24px);
        transform: translateX(-100%);
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-head {
        padding: 24px 20px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-shrink: 0;
      }
      .sidebar-head h3 {
        font-family: "Syne", sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--gold);
      }
      .sidebar-close {
        width: 28px;
        height: 28px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        border-radius: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        transition: all 0.2s ease;
      }
      .sidebar-close:hover {
        background: var(--gold);
        color: var(--ink);
        border-color: var(--gold);
      }

      .sidebar-list {
        list-style: none;
        overflow-y: auto;
        flex: 1;
        padding: 12px 0;
      }
      .sidebar-list::-webkit-scrollbar {
        width: 3px;
      }
      .sidebar-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
      .sidebar-list li {
        padding: 10px 20px;
        font-size: 0.82rem;
        font-weight: 500;
        color: var(--muted);
        cursor: pointer;
        border-left: 2px solid transparent;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sidebar-list li:hover {
        color: var(--cream);
        background: rgba(201, 168, 76, 0.05);
      }
      .sidebar-list li.active {
        color: var(--gold);
        border-left-color: var(--gold);
        background: rgba(201, 168, 76, 0.07);
      }
      .sidebar-list li .li-num {
        font-family: "Playfair Display", serif;
        font-size: 0.75rem;
        font-style: italic;
        color: rgba(201, 168, 76, 0.4);
        min-width: 20px;
      }
      .sidebar-list li.active .li-num {
        color: var(--gold);
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        z-index: 250;
        background: rgba(0, 0, 0, 0.4);
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.4s ease,
          visibility 0.4s ease;
      }
      .sidebar-overlay.open {
        opacity: 1;
        visibility: visible;
      }

      /* ══════════════════════════════════════
         TOAST
      ══════════════════════════════════════ */
      #toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: var(--glass2);
        border: 1px solid var(--border);
        padding: 10px 20px;
        border-radius: 2px;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        color: var(--cream);
        backdrop-filter: blur(12px);
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
        white-space: nowrap;
      }
      #toast.show {
        opacity: 1;
        visibility: visible;
        transform: translateX(-50%) translateY(0);
      }

      /* ══════════════════════════════════════
         RESPONSIVE
      ══════════════════════════════════════ */
      @media (max-width: 768px) {
        .slide-content {
          width: 100%;
          padding: 80px 24px 100px;
          background: linear-gradient(
            to top,
            var(--ink2) 0%,
            rgba(10, 10, 15, 0.85) 100%
          );
        }
        .slide-bg::after {
          background: linear-gradient(
            to top,
            rgba(10, 10, 15, 0.95) 35%,
            rgba(10, 10, 15, 0.4) 70%
          );
        }
        .slide-photo {
          width: 100%;
          align-items: flex-start;
          padding-top: 50px;
          justify-content: center;
          z-index: 2;
        }
        .portrait-wrap {
          opacity: 1;
          transform: none;
        }
        .portrait-frame {
          width: 140px;
          height: 180px;
        }
        .s-num {
          display: none;
        }
        .controls {
          padding: 12px 20px 16px;
        }
        .ctrl-hint {
          display: none;
        }
        .stage-header {
          padding: 14px 80px;
        }
        .logo-pin img {
          width: 32px;
        }
        .s-name {
          font-size: clamp(1.6rem, 6vw, 2.4rem);
        }
      }
    </style>
  </head>
  <body>
    <!-- STARFIELD -->
    <canvas id="cv"></canvas>

    <!-- GATE SCREEN -->
    <div id="gateScreen">
      <div class="gate-ornament"></div>
      <div class="gate-ring"></div>
      <div class="gate-ring"></div>
      <div class="gate-inner">
        <p class="gate-school-name">SD Negeri 01 Totorejo</p>
        <h1 class="gate-title">
          Pelepasan<br />
          <em>Siswa Kelas VI</em>
        </h1>
        <div class="gate-line"></div>
        <p class="gate-year">Tahun Ajaran 2025 / 2026</p>
        <button class="gate-btn" id="gateBtn">Buka Layar ✦</button>
      </div>
    </div>

    <!-- INTRO SCREEN -->
    <div id="introScreen">
      <div class="intro-words" id="introWords"></div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- SIDEBAR -->
    <button class="sidebar-toggle" id="sidebarToggle">‹</button>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h3>Daftar Siswa</h3>
        <button class="sidebar-close" id="sidebarClose">×</button>
      </div>
      <ul class="sidebar-list" id="sidebarList"></ul>
    </div>

    <!-- MAIN STAGE -->
    <div id="stage">
      <!-- School Logos -->
      <div class="logo-pin tl">
        <img src="logo/okut.png" alt="Logo OKU Timur" />
      </div>
      <div class="logo-pin tr">
        <img src="logo/twh.png" alt="Logo Tut Wuri Handayani" />
      </div>

      <!-- Header -->
      <div class="stage-header">
        <div class="stage-header-inner">
          <div class="stage-title">Pelepasan Siswa SD Negeri 01 Toto Rejo</div>
          <div class="stage-subtitle">Tahun Ajaran 2025 / 2026</div>
        </div>
      </div>

      <!-- Slide Container -->
      <div id="slideContainer"></div>

      <!-- Controls -->
      <div class="controls">
        <div class="ctrl-counter">
          <div class="ctrl-num" id="ctrlNum">1</div>
          <div class="ctrl-total">
            dari<span class="ctrl-total-n" id="ctrlTotal">—</span>
          </div>
        </div>

        <div class="ctrl-center">
          <div class="dots-row" id="dotsRow"></div>
          <div class="autoplay-row">
            <div class="ap-ring" id="apRing" title="Auto-play (Spasi)">
              <svg width="36" height="36" viewBox="0 0 36 36">
                <circle class="ap-ring-track" cx="18" cy="18" r="14" />
                <circle
                  class="ap-ring-fill"
                  id="apFill"
                  cx="18"
                  cy="18"
                  r="14"
                />
              </svg>
              <div class="ap-icon" id="apIcon">▶</div>
            </div>
            <span class="ctrl-hint"
              >← → navigasi &nbsp;·&nbsp; Spasi auto &nbsp;·&nbsp; F flip
              &nbsp;·&nbsp; F11 fullscreen</span
            >
          </div>
        </div>

        <div class="ctrl-right">
          <button class="nav-btn" id="prevBtn" title="Sebelumnya (←)">
            <svg viewBox="0 0 12 12"><polyline points="8,2 4,6 8,10" /></svg>
          </button>
          <button class="nav-btn" id="nextBtn" title="Selanjutnya (→)">
            <svg viewBox="0 0 12 12"><polyline points="4,2 8,6 4,10" /></svg>
          </button>
          <button class="nav-btn" id="fsBtn" title="Fullscreen (F11)">
            <svg id="fsIcon" viewBox="0 0 12 12">
              <path d="M1 4V1h3M8 1h3v3M11 8v3H8M4 11H1V8" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script>
      /* ══════════════════════════════════════
       STARFIELD
    ══════════════════════════════════════ */
      (function () {
        const c = document.getElementById("cv"),
          ctx = c.getContext("2d");
        let W,
          H,
          stars = [];
        function rsz() {
          W = c.width = innerWidth;
          H = c.height = innerHeight;
        }
        function mk() {
          return {
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 1.2 + 0.2,
            a: Math.random(),
            da: (Math.random() - 0.5) * 0.005,
            vy: Math.random() * 0.08 + 0.02,
            gold: Math.random() < 0.1,
          };
        }
        function init() {
          stars = Array.from({ length: 180 }, mk);
        }
        function draw() {
          ctx.clearRect(0, 0, W, H);
          stars.forEach((s) => {
            s.a += s.da;
            if (s.a <= 0 || s.a >= 1) s.da *= -1;
            s.y -= s.vy;
            if (s.y + s.r < 0) {
              s.y = H + s.r;
              s.x = Math.random() * W;
            }
            ctx.save();
            ctx.globalAlpha = s.a * 0.7;
            ctx.fillStyle = s.gold ? "#E8C97A" : "#FFFFFF";
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          });
          requestAnimationFrame(draw);
        }
        rsz();
        init();
        draw();
        window.addEventListener("resize", () => {
          rsz();
          init();
        });
      })();

      /* ══════════════════════════════════════
       STATE
    ══════════════════════════════════════ */
      let students = [],
        cur = 0,
        transitioning = false;
      let ap = false,
        tRaf = null,
        tStart = null,
        tElapsed = 0;
      const AUTO = 15000,
        CIRC = 2 * Math.PI * 14;
      const flipStates = {};

      /* ══════════════════════════════════════
       LOAD DATA
    ══════════════════════════════════════ */
      async function load() {
        try {
          const r = await fetch("data.json");
          if (!r.ok) throw new Error();
          students = await r.json();
        } catch {
          students = [
            {
              nama: "Ahmad Fauzi",
              ttl: "Palembang, 15 Maret 2014",
              namaAyah: "Budi Santoso",
              namaIbu: "Sri Wahyuni",
              citaCita: "Dokter Spesialis Anak",
              pesan: "Jadilah orang yang bermanfaat bagi sesama.",
              foto: "https://api.dicebear.com/7.x/initials/svg?seed=Ahmad+Fauzi&fontSize=38&backgroundColor=0c1a3a&textColor=c9a84c",
              fotoCita: "",
            },
            {
              nama: "Siti Rahmawati",
              ttl: "Totorejo, 22 Juli 2014",
              namaAyah: "Rahmat Hidayat",
              namaIbu: "Nurul Fadilah",
              citaCita: "Guru Bahasa Inggris",
              pesan: "Terus belajar dan jangan pernah menyerah.",
              foto: "https://api.dicebear.com/7.x/initials/svg?seed=Siti+Rahmawati&fontSize=38&backgroundColor=180c3a&textColor=c9a84c",
              fotoCita: "",
            },
          ];
        }

        // Push closing slide
        students.push({ isClosing: true });

        buildSlides();
        buildDots();
        buildSidebar();
        show(0, true);
      }

      /* ══════════════════════════════════════
       BUILD SLIDES
    ══════════════════════════════════════ */
      const BG_COLORS = [
        ["#0c1a3a", "#0a1228"],
        ["#1a0c2e", "#120a22"],
        ["#0c2a1a", "#08201a"],
        ["#2a1400", "#1e0e00"],
        ["#0a2828", "#08201e"],
        ["#200c2e", "#180a22"],
        ["#001422", "#001828"],
        ["#1e1000", "#160a00"],
      ];

      function buildSlides() {
        const container = document.getElementById("slideContainer");
        container.innerHTML = "";
        students.forEach((s, i) => {
          const slide = document.createElement("div");
          slide.className = "slide";
          slide.id = `slide-${i}`;

          if (s.isClosing) {
            slide.innerHTML = buildClosingHTML();
          } else {
            const [c1, c2] = BG_COLORS[i % BG_COLORS.length];
            const bgStyle =
              s.foto &&
              !s.foto.startsWith("data:") &&
              !s.foto.includes("dicebear")
                ? `background-image: url('${s.foto}'); background-color: ${c1};`
                : `background: linear-gradient(135deg, ${c1} 0%, ${c2} 100%);`;

            slide.innerHTML = buildStudentHTML(s, i, bgStyle);
          }

          container.appendChild(slide);
        });

        // Attach flip handlers
        document.querySelectorAll(".portrait-frame").forEach((frame) => {
          frame.addEventListener("click", () => {
            const idx = parseInt(frame.dataset.idx);
            doFlip(idx);
          });
        });
      }

      function buildStudentHTML(s, i, bgStyle) {
        const photoSrc =
          s.foto ||
          `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(s.nama)}&fontSize=38&backgroundColor=0c1a3a&textColor=c9a84c`;
        const dreamSrc = s.fotoCita || photoSrc;
        const idx = i;

        return `
        <div class="slide-bg" style="${bgStyle}"></div>

        <div class="slide-content">
          <div class="s-num">${String(i + 1).padStart(2, "0")}</div>
          <div class="s-tag">Siswa ke-${i + 1}</div>
          <h2 class="s-name">${s.nama}</h2>
          <p class="s-ttl">${s.ttl}</p>
          <div class="s-divider"></div>
          <div class="s-meta">
            <div class="s-meta-row">
              <span class="s-meta-lbl">Nama Ayah</span>
              <span class="s-meta-sep">◆</span>
              <span class="s-meta-val">${s.namaAyah}</span>
            </div>
            <div class="s-meta-row">
              <span class="s-meta-lbl">Nama Ibu</span>
              <span class="s-meta-sep">◆</span>
              <span class="s-meta-val">${s.namaIbu}</span>
            </div>
          </div>
          <div class="s-dream">
            <p class="s-dream-lbl">✦ Cita-cita</p>
            <p class="s-dream-val">${s.citaCita}</p>
            <p class="s-dream-msg-lbl">✦ Pesan</p>
            <p class="s-dream-msg">"${s.pesan}"</p>
          </div>
        </div>

        <div class="slide-photo">
          <div class="portrait-wrap">
            <div class="portrait-extra-corners">
              <div class="portrait-frame" data-idx="${idx}" title="Klik untuk melihat masa depan ✦">
                <div class="portrait-corners"></div>
                <img class="portrait-img front" src="${photoSrc}"
                  alt="${s.nama}"
                  onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(s.nama)}&fontSize=38&backgroundColor=0c1a3a&textColor=c9a84c'">
                <img class="portrait-img back" src="${dreamSrc}"
                  alt="${s.nama} — ${s.citaCita}"
                  onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(s.nama + " dream")}&fontSize=38&backgroundColor=180c3a&textColor=c9a84c'">
              </div>
            </div>
            <div class="photo-state-label" id="psl-${i}">Foto Sekarang</div>
            <div class="flip-hint">✦ &nbsp; klik foto untuk flip &nbsp; ✦</div>
          </div>
        </div>
      `;
      }

      function buildClosingHTML() {
        return `
        <div class="slide-bg" style="background: radial-gradient(ellipse 80% 80% at 50% 50%, #1a1208 0%, #0a0a0f 100%);"></div>
        <div class="slide-closing">
          <p class="closing-badge">✦ Terima Kasih ✦</p>
          <h2 class="closing-title">Selamat<br><em>Menggapai Mimpi</em></h2>
          <div class="closing-divider"><span>✦</span></div>
          <p class="closing-quote">"Masa depan adalah milik mereka yang percaya pada keindahan impian mereka. Teruslah melangkah, jagalah api semangat belajarmu, dan jadilah kebanggaan bagi nusa dan bangsa."</p>
          <div class="closing-school">
            <p class="closing-school-name">SD Negeri 01 Totorejo</p>
            <p class="closing-school-year">Tahun Ajaran 2025 / 2026</p>
          </div>
        </div>
      `;
      }

      /* ══════════════════════════════════════
       DOTS
    ══════════════════════════════════════ */
      function buildDots() {
        const row = document.getElementById("dotsRow");
        row.innerHTML = "";
        const max = 20;
        if (students.length <= max) {
          students.forEach((_, i) => {
            const d = document.createElement("div");
            d.className = "dot";
            d.addEventListener("click", () => goto(i));
            row.appendChild(d);
          });
        }
        document.getElementById("ctrlTotal").textContent = students.length;
        updateDots();
      }

      function updateDots() {
        document
          .querySelectorAll(".dot")
          .forEach((d, i) => d.classList.toggle("a", i === cur));
        document.getElementById("ctrlNum").textContent = cur + 1;
      }

      /* ══════════════════════════════════════
       BUILD SIDEBAR
    ══════════════════════════════════════ */
      function buildSidebar() {
        const list = document.getElementById("sidebarList");
        list.innerHTML = "";
        students.forEach((s, i) => {
          if (s.isClosing) return;
          const li = document.createElement("li");
          li.innerHTML = `<span class="li-num">${String(i + 1).padStart(2, "0")}</span>${s.nama}`;
          li.dataset.idx = i;
          if (i === cur) li.classList.add("active");
          li.addEventListener("click", () => {
            goto(i);
            closeSidebar();
          });
          list.appendChild(li);
        });
      }

      function updateSidebar() {
        document.querySelectorAll("#sidebarList li").forEach((li) => {
          li.classList.toggle("active", parseInt(li.dataset.idx) === cur);
        });
      }

      /* ══════════════════════════════════════
       SHOW / GOTO / CHANGE
    ══════════════════════════════════════ */
      function show(idx, init = false) {
        const slides = document.querySelectorAll(".slide");
        slides.forEach((s, i) => {
          s.classList.toggle("active", i === idx);
        });
        updateDots();
        updateSidebar();
      }

      function goto(idx) {
        if (transitioning || idx === cur) return;
        const prev = cur;
        cur = idx;
        show(cur);
        // Reset flip label
        const lbl = document.getElementById(`psl-${cur}`);
        if (lbl && !flipStates[cur]) lbl.textContent = "Foto Sekarang";
        transitioning = true;
        setTimeout(() => {
          transitioning = false;
        }, 1200);
        restartTimer();
      }

      function chg(dir) {
        const next = cur + dir;
        if (next >= students.length) return;
        if (next < 0) return;
        goto(next);
      }

      /* ══════════════════════════════════════
       FLIP
    ══════════════════════════════════════ */
      function doFlip(idx) {
        flipStates[idx] = !flipStates[idx];
        const flipped = flipStates[idx];
        const frame = document.querySelector(
          `.portrait-frame[data-idx="${idx}"]`,
        );
        const lbl = document.getElementById(`psl-${idx}`);
        if (!frame) return;
        frame.classList.toggle("flipped", flipped);
        if (lbl) {
          lbl.style.opacity = "0";
          setTimeout(() => {
            lbl.textContent = flipped ? "✦ Foto Masa Depan" : "Foto Sekarang";
            lbl.style.opacity = "1";
          }, 800);
        }
      }

      /* ══════════════════════════════════════
       AUTOPLAY TIMER
    ══════════════════════════════════════ */
      const apFill = document.getElementById("apFill");
      const apIcon = document.getElementById("apIcon");
      apFill.style.strokeDasharray = CIRC;
      apFill.style.strokeDashoffset = CIRC;

      function toggleAP() {
        ap = !ap;
        apIcon.textContent = ap ? "⏸" : "▶";
        if (ap) startTimer();
        else stopTimer();
      }
      function startTimer() {
        tStart = performance.now() - tElapsed;
        tRaf = requestAnimationFrame(tickTimer);
      }
      function stopTimer() {
        if (tRaf) {
          cancelAnimationFrame(tRaf);
          tRaf = null;
        }
        apFill.style.strokeDashoffset = CIRC;
        tElapsed = 0;
      }
      function restartTimer() {
        stopTimer();
        if (ap) startTimer();
      }
      function tickTimer() {
        tElapsed = performance.now() - tStart;
        const p = Math.min(tElapsed / AUTO, 1);
        apFill.style.strokeDashoffset = CIRC * (1 - p);
        if (p >= 1) {
          chg(1);
          return;
        }
        if (ap) tRaf = requestAnimationFrame(tickTimer);
      }
      document.getElementById("apRing").addEventListener("click", toggleAP);

      /* ══════════════════════════════════════
       FULLSCREEN
    ══════════════════════════════════════ */
      const ICON_ENTER = "M1 4V1h3M8 1h3v3M11 8v3H8M4 11H1V8";
      const ICON_EXIT = "M4 1v3H1M8 1v3h3M8 11v-3h3M4 11v-3H1";
      const fsBtn = document.getElementById("fsBtn");
      const fsIconPath = document.querySelector("#fsIcon path");
      let toastTimer = null;

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
      }
      function toggleFS() {
        if (!document.fullscreenElement) {
          document.documentElement
            .requestFullscreen({ navigationUI: "hide" })
            .then(() => showToast("✦ Fullscreen — tekan Esc untuk keluar"))
            .catch(() => showToast("Fullscreen tidak didukung di browser ini"));
        } else {
          document.exitFullscreen().then(() => showToast("Keluar Fullscreen"));
        }
      }
      function updateFsIcon() {
        fsIconPath.setAttribute(
          "d",
          document.fullscreenElement ? ICON_EXIT : ICON_ENTER,
        );
      }
      fsBtn.addEventListener("click", toggleFS);
      document.addEventListener("fullscreenchange", updateFsIcon);

      /* ══════════════════════════════════════
       SIDEBAR HANDLERS
    ══════════════════════════════════════ */
      const sidebarEl = document.getElementById("sidebar");
      const sidebarOverlay = document.getElementById("sidebarOverlay");
      function openSidebar() {
        sidebarEl.classList.add("open");
        sidebarOverlay.classList.add("open");
        document.getElementById("sidebarToggle").style.transform =
          "translateY(-50%) translateX(-100%)";
      }
      function closeSidebar() {
        sidebarEl.classList.remove("open");
        sidebarOverlay.classList.remove("open");
        document.getElementById("sidebarToggle").style.transform =
          "translateY(-50%)";
      }
      document
        .getElementById("sidebarToggle")
        .addEventListener("click", openSidebar);
      document
        .getElementById("sidebarClose")
        .addEventListener("click", closeSidebar);
      sidebarOverlay.addEventListener("click", closeSidebar);

      /* ══════════════════════════════════════
       KEYBOARD & TOUCH
    ══════════════════════════════════════ */
      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight" || e.key === "ArrowDown") chg(1);
        else if (e.key === "ArrowLeft" || e.key === "ArrowUp") chg(-1);
        else if (e.key === " ") {
          e.preventDefault();
          toggleAP();
        } else if (e.key === "f" || e.key === "F") doFlip(cur);
        else if (e.key === "F11") {
          e.preventDefault();
          toggleFS();
        }
      });

      let tx0 = 0;
      document
        .getElementById("slideContainer")
        .addEventListener("touchstart", (e) => (tx0 = e.touches[0].clientX), {
          passive: true,
        });
      document.getElementById("slideContainer").addEventListener(
        "touchend",
        (e) => {
          const dx = e.changedTouches[0].clientX - tx0;
          if (Math.abs(dx) > 50) chg(dx < 0 ? 1 : -1);
        },
        { passive: true },
      );

      document
        .getElementById("prevBtn")
        .addEventListener("click", () => chg(-1));
      document
        .getElementById("nextBtn")
        .addEventListener("click", () => chg(1));

      /* ══════════════════════════════════════
       GATE & INTRO CONTROLLER
    ══════════════════════════════════════ */
      const INTRO_LINES = [
        { text: "Dengan bangga kami persembahkan...", delay: 0 },
        { text: "<span>Pelepasan Siswa</span>", delay: 900 },
        { text: "Kelas VI Tahun 2025/2026", delay: 1700 },
      ];

      document.getElementById("gateBtn").addEventListener("click", () => {
        const gate = document.getElementById("gateScreen");
        const intro = document.getElementById("introScreen");
        const stage = document.getElementById("stage");

        gate.classList.add("out");

        // Show intro
        setTimeout(() => {
          intro.classList.add("active");
          const container = document.getElementById("introWords");
          container.innerHTML = "";
          INTRO_LINES.forEach((line) => {
            const el = document.createElement("span");
            el.className = "intro-word";
            el.innerHTML = line.text;
            container.appendChild(el);
            setTimeout(() => el.classList.add("vis"), line.delay + 300);
          });

          // After intro, show stage
          setTimeout(() => {
            intro.classList.add("out");
            setTimeout(() => {
              stage.classList.add("vis");
              // Auto-start autoplay after brief pause
              setTimeout(() => {
                if (!ap) toggleAP();
              }, 1500);
            }, 400);
          }, 4200);
        }, 800);
      });

      /* ══════════════════════════════════════
       BOOT
    ══════════════════════════════════════ */
      load();
    </script>
  </body>
</html>
